<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wayra — AI Travel Planner</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #0f0f0f;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .logo {
      font-size: 56px;
      font-weight: 800;
      letter-spacing: -2px;
      background: linear-gradient(135deg, #f8e9ba, #d4a853);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 16px;
    }
    .tagline {
      font-size: 18px;
      color: #888;
      margin-bottom: 48px;
    }
    .badge {
      display: inline-block;
      background: #1a1a1a;
      border: 1px solid #333;
      padding: 12px 28px;
      border-radius: 12px;
      font-size: 15px;
      color: #ccc;
      margin-bottom: 64px;
      text-decoration: none;
    }
    .badge:hover { border-color: #555; color: #fff; }
    nav {
      display: flex;
      gap: 32px;
      flex-wrap: wrap;
      justify-content: center;
    }
    nav a {
      color: #666;
      text-decoration: none;
      font-size: 14px;
      transition: color 0.2s;
    }
    nav a:hover { color: #ccc; }
    footer {
      position: fixed;
      bottom: 24px;
      color: #444;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="logo">Wayra</div>
  <p class="tagline">Your AI-powered travel buddy</p>

  <a class="badge" href="https://play.google.com/store" target="_blank">
    ↓ Available on Google Play
  </a>

  <nav>
    <a href="privacy-policy.html">Privacy Policy</a>
    <a href="terms.html">Terms of Service</a>
    <a href="mailto:[YOUR_SUPPORT_EMAIL]">Support</a>
  </nav>

  <footer>&copy; 2026 Wayra. All rights reserved.</footer>
</body>
</html>
